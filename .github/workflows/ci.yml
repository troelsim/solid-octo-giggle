name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Only CSS lint is enforced in CI today; eslint has pre-existing
      # violations that are out of scope for the step-2 CSS migration.
      - name: Run CSS lint
        run: npm run lint:css

      - name: Run tests
        run: npm test
        env:
          CI: true
